<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  body{margin:0;background:#EEF1F4;font-family:'Hiragino Sans',sans-serif;color:#0C141C}
  h1{text-align:center;font-size:22px;margin:24px 0 4px}
  p.sub{text-align:center;color:#5b6b7a;margin:0 0 24px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:1180px;margin:0 auto;padding:0 20px 40px}
  .card{background:#fff;border-radius:20px;padding:18px 12px;box-shadow:0 4px 18px rgba(15,95,166,.10);text-align:center}
  .card img{width:100%;height:240px;object-fit:contain}
  .card .name{font-weight:800;margin-top:10px;font-size:15px}
  .card .desc{color:#5b6b7a;font-size:12.5px;margin-top:2px}
  .iconrow{display:flex;justify-content:center;gap:22px;align-items:center;margin:8px auto 36px}
  .iconrow .app{width:120px;height:120px;border-radius:27px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.18)}
  .iconrow .app.sm{width:64px;height:64px;border-radius:15px}
  .iconrow img{width:100%;height:100%;display:block}
  .iconwrap{text-align:center}
  .iconwrap .lbl{font-size:12.5px;color:#5b6b7a;margin-top:8px}
</style></head>
<body>
  <h1>しかくとり — キャラクター＆アプリアイコン</h1>
  <p class="sub">テーマカラー #0F5FA6 / 合格ハチマキ / Duolingo風リアクション</p>

  <div class="iconrow">
    <div class="iconwrap"><div class="app"><img src="shikakutori-icon.svg"></div><div class="lbl">アイコン(実寸120px)</div></div>
    <div class="iconwrap"><div class="app sm"><img src="shikakutori-icon.svg"></div><div class="lbl">ホーム画面(64px)</div></div>
  </div>

  <div class="grid">
    <div class="card"><img src="shikakutori-icon.svg"><div class="name">アプリアイコン</div><div class="desc">合格ハチマキ・顔アップ</div></div>
    <div class="card"><img src="shikakutori-badge.svg"><div class="name">メイン(標準)</div><div class="desc">全身・自信の表情</div></div>
    <div class="card"><img src="shikakutori-correct.svg"><div class="name">正解リアクション</div><div class="desc">笑顔＋「せいかい！」</div></div>
    <div class="card"><img src="shikakutori-wrong.svg"><div class="name">不正解リアクション</div><div class="desc">悔しい顔＋「おしい！」</div></div>
  </div>
</body></html>
