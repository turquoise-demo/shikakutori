<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="しかくとり アプリアイコン">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#12639E"/><stop offset="1" stop-color="#082C52"/></linearGradient>
    <linearGradient id="iheadG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3B93D6"/><stop offset="1" stop-color="#0F5FA6"/></linearGradient>
    <linearGradient id="ibeakG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8B24C"/><stop offset="1" stop-color="#E37F16"/></linearGradient>
    <linearGradient id="ifaceG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBF0"/><stop offset="1" stop-color="#F1E7D1"/></linearGradient>
  </defs>

  <!-- full-bleed background (iOS applies rounded mask) -->
  <rect width="1024" height="1024" fill="url(#ibg)"/>

  <!-- crest -->
  <g fill="#3B93D6">
    <path d="M452 176 q-22 -84 22 -96 q44 12 22 96 z"/>
    <path d="M520 160 q-22 -96 22 -108 q44 12 22 108 z"/>
    <path d="M588 176 q-22 -84 22 -96 q44 12 22 96 z"/>
  </g>

  <!-- head -->
  <rect x="150" y="170" width="724" height="700" rx="168" fill="url(#iheadG)"/>
  <rect x="150" y="170" width="724" height="700" rx="168" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="8"/>

  <!-- headband -->
  <path d="M132 300 q380 -64 760 0 l0 118 q-380 -64 -760 0 z" fill="#FFFFFF"/>
  <path d="M132 300 q380 -64 760 0" fill="none" stroke="#D23B3B" stroke-width="11"/>
  <path d="M132 418 q380 -64 760 0" fill="none" stroke="#D23B3B" stroke-width="11"/>
  <circle cx="878" cy="360" r="34" fill="#D23B3B"/>
  <path d="M894 344 q96 -40 126 -6 q-74 6 -114 44 z" fill="#E24747"/>
  <path d="M894 384 q96 40 120 86 q-80 -18 -120 -52 z" fill="#C22F2F"/>
  <text x="505" y="362" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="900" font-size="96" fill="#D23B3B" letter-spacing="14">合格</text>

  <!-- face patch -->
  <rect x="258" y="452" width="508" height="330" rx="104" fill="url(#ifaceG)"/>

  <!-- cheeks -->
  <ellipse cx="330" cy="672" rx="50" ry="32" fill="#F28C82" opacity="0.6"/>
  <ellipse cx="694" cy="672" rx="50" ry="32" fill="#F28C82" opacity="0.6"/>

  <!-- eyes -->
  <ellipse cx="410" cy="590" rx="46" ry="58" fill="#26333F"/>
  <ellipse cx="614" cy="590" rx="46" ry="58" fill="#26333F"/>
  <circle cx="395" cy="568" r="15" fill="#fff"/>
  <circle cx="599" cy="568" r="15" fill="#fff"/>

  <!-- beak -->
  <path d="M456 620 h112 l-56 78 z" fill="url(#ibeakG)" stroke="#D9740F" stroke-width="4" stroke-linejoin="round"/>
</svg>
