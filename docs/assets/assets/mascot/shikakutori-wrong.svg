<svg viewBox="0 0 380 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="しかくとり 不正解でくやしい">
  <defs>
    <linearGradient id="wbodyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2A7DC4"/><stop offset="1" stop-color="#0F5FA6"/></linearGradient>
    <linearGradient id="wheadG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F86CC"/><stop offset="1" stop-color="#0F5FA6"/></linearGradient>
    <linearGradient id="wbeakG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6AE45"/><stop offset="1" stop-color="#E37F16"/></linearGradient>
    <linearGradient id="wfaceG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBF0"/><stop offset="1" stop-color="#F3EAD6"/></linearGradient>
  </defs>

  <ellipse cx="190" cy="414" rx="96" ry="15" fill="#0F5FA6" opacity="0.12"/>
  <g stroke="#E37F16" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M160 388 l-13 20 M160 388 l0 22 M160 388 l13 20"/>
    <path d="M220 388 l-13 20 M220 388 l0 22 M220 388 l13 20"/>
  </g>

  <rect x="104" y="252" width="172" height="138" rx="46" fill="url(#wbodyG)"/>
  <!-- drooping wings -->
  <ellipse cx="110" cy="330" rx="22" ry="46" fill="#0C4E8A" transform="rotate(10 110 330)"/>
  <ellipse cx="270" cy="330" rx="22" ry="46" fill="#0C4E8A" transform="rotate(-10 270 330)"/>

  <g fill="#2F86CC">
    <path d="M165 84 q-8 -30 8 -34 q16 4 8 34 z"/>
    <path d="M190 78 q-8 -34 8 -38 q16 4 8 38 z"/>
    <path d="M215 84 q-8 -30 8 -34 q16 4 8 34 z"/>
  </g>

  <rect x="68" y="80" width="244" height="214" rx="54" fill="url(#wheadG)"/>

  <!-- headband -->
  <path d="M60 116 q130 -22 260 0 l0 42 q-130 -22 -260 0 z" fill="#FFFFFF"/>
  <path d="M60 116 q130 -22 260 0" fill="none" stroke="#D23B3B" stroke-width="4"/>
  <path d="M60 158 q130 -22 260 0" fill="none" stroke="#D23B3B" stroke-width="4"/>
  <circle cx="316" cy="138" r="12" fill="#D23B3B"/>
  <path d="M322 132 q34 -14 44 -2 q-26 2 -40 16 z" fill="#E24747"/>
  <path d="M322 146 q34 14 42 30 q-28 -6 -42 -18 z" fill="#C22F2F"/>
  <text x="190" y="137" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="900" font-size="30" fill="#D23B3B" letter-spacing="4">合格</text>

  <rect x="100" y="166" width="180" height="112" rx="38" fill="url(#wfaceG)"/>
  <ellipse cx="126" cy="244" rx="16" ry="10" fill="#F28C82" opacity="0.45"/>
  <ellipse cx="254" cy="244" rx="16" ry="10" fill="#F28C82" opacity="0.45"/>

  <!-- frustrated brows -->
  <path d="M132 190 L162 202" stroke="#26333F" stroke-width="7" stroke-linecap="round"/>
  <path d="M248 190 L218 202" stroke="#26333F" stroke-width="7" stroke-linecap="round"/>

  <!-- squeezed eyes >< -->
  <path d="M138 210 l18 8 l-18 8" fill="none" stroke="#26333F" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M242 210 l-18 8 l18 8" fill="none" stroke="#26333F" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- tear -->
  <path d="M158 226 q-7 12 0 18 q7 -6 0 -18 z" fill="#4FB0E8"/>

  <!-- gritted beak -->
  <path d="M172 232 h36 l-18 12 z" fill="url(#wbeakG)" stroke="#D9740F" stroke-width="1.2"/>
  <path d="M176 250 l7 7 l7 -7 l7 7 l7 -7" fill="none" stroke="#26333F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- speech bubble (front) -->
  <g>
    <rect x="216" y="20" width="146" height="66" rx="20" fill="#D23B3B"/>
    <path d="M248 86 L276 86 L236 116 Z" fill="#D23B3B"/>
    <text x="289" y="62" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="900" font-size="30" fill="#fff">おしい！</text>
  </g>
</svg>
